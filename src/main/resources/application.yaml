spring:
  application:
    name: jsu
  docker:
    compose:
      enabled: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jsudb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:jsu}
    password: ${DB_PASSWORD:jsu1234}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false        # auto-config 비활성 → FlywayConfig.java 에서 직접 Bean 등록
    baseline-on-migrate: true
    baseline-version: 0

app:
  # 관리자 비밀번호. 환경변수 APP_ADMIN_PASSWORD로 오버라이드 가능.
  # 예) APP_ADMIN_PASSWORD=my-secure-pw ./gradlew bootRun
  admin-password: ${APP_ADMIN_PASSWORD:admin1234}

logging:
  level:
    org.flywaydb: INFO
